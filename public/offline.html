<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0284c7" />
    <title>Offline | Weather PWA</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(135deg, #e0f2fe, #f8fafc);
        color: #0f172a;
      }

      article {
        max-width: 440px;
        border: 1px solid rgb(148 163 184 / 0.35);
        border-radius: 28px;
        background: rgb(255 255 255 / 0.82);
        padding: 28px;
        box-shadow: 0 24px 70px -40px rgb(15 23 42 / 0.5);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 8vw, 44px);
        line-height: 1;
      }

      p {
        margin: 0 0 20px;
        color: #475569;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        border-radius: 999px;
        background: #0284c7;
        color: white;
        padding: 12px 18px;
        font-weight: 800;
        text-decoration: none;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #020617, #0f172a);
          color: #f8fafc;
        }

        article {
          border-color: rgb(255 255 255 / 0.12);
          background: rgb(15 23 42 / 0.82);
        }

        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <article>
      <h1>You are offline</h1>
      <p>The app shell is available, and recently viewed forecasts may still load from cache. Reconnect to search new cities or refresh weather data.</p>
      <a href="/">Return to Weather PWA</a>
    </article>
  </body>
</html>
